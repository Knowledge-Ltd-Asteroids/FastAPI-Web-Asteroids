{% extends "base.html" %}
{% block title %}Astro-Blaster{% endblock %}

{% block internal_css %}
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
    }

    #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
    }

    #joystick-container {
        display: none;
        position: fixed;
        bottom: 30px;
        left: 30px;
        width: 120px;
        height: 120px;
        z-index: 100;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 50%;
        }

    .simple-shoot-btn {
        display: none;
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.5);
        border: 2px solid rgba(255, 100, 100, 0.6);
        color: #ff6666;
        font-size: 40px;
        z-index: 100;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }

    .simple-shoot-btn:active {
        background: rgba(255, 100, 100, 0.3);
    }

    #game-over-screen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .game-over-title {
        color: white;
        font-family: 'Press Start 2P', monospace;
        font-size: 48px;
        margin-bottom: 40px;
    }

    .stat-row {
        margin: 10px 0;
    }

    .stat-label {
        color: white;
        font-family: 'Press Start 2P', monospace;
        font-size: 20px;
    }

    .stat-value {
        color: #E1B100;
        font-family: 'Press Start 2P', monospace;
        font-size: 20px;
    }

    .button-group {
        margin-top: 50px;
        display: flex;
        gap: 20px;
    }

    .retry-btn {
        background: transparent;
        border: 3px solid #E1B100;
        color: #E1B100;
        font-family: 'Press Start 2P', monospace;
        font-size: 16px;
        padding: 15px 30px;
        cursor: pointer;
    }

    .menu-btn {
        background: transparent;
        border: 3px solid #7A8D9D;
        color: #7A8D9D;
        font-family: 'Press Start 2P', monospace;
        font-size: 16px;
        padding: 15px 30px;
        cursor: pointer;
    }

    .retry-btn:hover {
        background: #E1B100;
        color: black;
    }

    .menu-btn:hover {
        background: #7A8D9D;
        color: black;
    }
</style>
{% endblock %}

{% block content %}
<canvas id="canvas"></canvas>

<div id="joystick-container"></div>
<button class="simple-shoot-btn" id="mobile-shoot">●</button>

<div id="game-over-screen">
    <h2 class="game-over-title">GAME OVER</h2>
    
    <div class="stat-row">
        <span class="stat-label">SCORE: </span>
        <span class="stat-value" id="final-score">0</span>
    </div>
    
    <div class="stat-row">
        <span class="stat-label">ASTEROIDS: </span>
        <span class="stat-value" id="asteroids-destroyed">0</span>
    </div>
    
    <div class="stat-row">
        <span class="stat-label">TIME: </span>
        <span class="stat-value" id="time-survived">0:00</span>
    </div>
    
    <div class="button-group">
        <button class="retry-btn" onclick="window.location.reload()">RETRY</button>
        <button class="menu-btn" onclick="window.location.href='/app'">MENU</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>
<script src="{{ url_for('static', path='js/astro-blaster.js') }}"></script>
{% endblock %}
