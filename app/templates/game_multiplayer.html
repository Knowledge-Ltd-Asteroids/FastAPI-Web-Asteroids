{% extends "base.html" %}
{% block title %}Multiplayer Asteroids{% endblock %}

{% block head %}
    {{ super() }}
    <meta name="access-token" content="{{ access_token }}">
{% endblock %}

{% block internal_css %}
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: var(--dark);
    }

    #canvas {
        display: block;
        background: black;
    }

    .hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 100;
    }

    .player-panel {
        position: fixed;
        padding: 1.5rem;
        font-family: var(--font-pixel);
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        background: rgba(28, 30, 38, 0.9);
        border: 2px solid var(--gold);
        min-width: 200px;
    }

    .player-panel.p1 {
        top: 1rem;
        left: 1rem;
    }

    .player-panel.p2 {
        top: 1rem;
        right: 1rem;
        text-align: right;
    }

    .player-name {
        color: var(--gold);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .player-stats {
        color: var(--light);
        font-size: 0.7rem;
        display: flex;
        gap: 1rem;
        justify-content: space-between;
    }

    .player-panel.p2 .player-stats {
        flex-direction: row-reverse;
    }

    .stat-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .stat-label {
        color: var(--slate);
        min-width: 50px;
    }

    .stat-value {
        color: var(--coral);
        min-width: 40px;
        text-align: right;
    }

    .player-panel.p2 .stat-value {
        text-align: left;
    }

    .lives {
        color: var(--coral);
    }

    .score {
        color: var(--gold);
    }

    .center-display {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
        font-family: var(--font-pixel);
        color: var(--gold);
        pointer-events: auto;
    }

    .connection-status {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        font-family: system-ui, sans-serif;
        font-size: 0.8rem;
        color: var(--slate);
        background: rgba(28, 30, 38, 0.8);
        padding: 0.5rem 1rem;
        border: 1px solid var(--slate);
    }

    .connection-status.connected {
        color: var(--gold);
        border-color: var(--gold);
    }

    .connection-status.disconnected {
        color: var(--coral);
        border-color: var(--coral);
    }

    .game-over-modal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(28, 30, 38, 0.95);
        border: 3px solid var(--gold);
        padding: 2rem;
        text-align: center;
        z-index: 200;
        display: none;
        backdrop-filter: blur(4px);
    }

    .game-over-modal.show {
        display: block;
    }

    .game-over-title {
        font-family: var(--font-pixel);
        color: var(--gold);
        font-size: 1.5rem;
        margin-bottom: 1rem;
    }

    .game-over-content {
        font-family: system-ui, sans-serif;
        color: var(--light);
        margin-bottom: 1.5rem;
        line-height: 1.6;
    }

    .game-over-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
    }

    .btn-return {
        background: transparent;
        border: 2px solid var(--gold);
        color: var(--gold);
        padding: 0.5rem 1.5rem;
        font-family: var(--font-pixel);
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 0.8rem;
        text-transform: uppercase;
    }

    .btn-return:hover {
        background: var(--gold);
        color: var(--dark);
    }
</style>
{% endblock %}

{% block content %}
<canvas id="canvas"></canvas>

<div class="hud">
    <!-- Player 1 (Left) -->
    <div class="player-panel p1">
        <div class="player-name" id="p1-name">Player 1</div>
        <div class="player-stats">
            <div class="stat-item">
                <span class="stat-label">Score:</span>
                <span class="stat-value score" id="p1-score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Lives:</span>
                <span class="stat-value lives" id="p1-lives">3</span>
            </div>
        </div>
    </div>

    <!-- Player 2 (Right) -->
    <div class="player-panel p2">
        <div class="player-name" id="p2-name">Player 2</div>
        <div class="player-stats">
            <div class="stat-item">
                <span class="stat-label">Score:</span>
                <span class="stat-value score" id="p2-score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Lives:</span>
                <span class="stat-value lives" id="p2-lives">3</span>
            </div>
        </div>
    </div>

    <!-- Connection Status -->
    <div class="connection-status" id="connection-status">Connecting...</div>

    <!-- Game Over Modal -->
    <div class="game-over-modal" id="game-over-modal">
        <div class="game-over-title" id="game-over-title">Game Over</div>
        <div class="game-over-content" id="game-over-content"></div>
        <div class="game-over-buttons">
            <button class="btn-return" onclick="window.location.href='/app/user'">Return to Lobby</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', path='js/asteroids.js') }}"></script>
{% endblock %}
