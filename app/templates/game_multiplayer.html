{% extends "base.html" %}
{% block title %}Multiplayer Astro-Blaster{% endblock %}

{% block internal_css %}
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: var(--dark);
    }

    #canvas {
        display: block;
        background: black;
    }

    .hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        pointer-events: none;
        z-index: 100;
    }

    .player-panel {
        position: fixed;
        padding: 1.5rem;
        font-family: var(--font-pixel);
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        background: rgba(28, 30, 38, 0.9);
        border: 2px solid var(--gold);
        min-width: 200px;
    }

    .player-panel.p1 {
        top: 1rem;
        left: 1rem;
    }

    .player-panel.p2 {
        top: 1rem;
        right: 1rem;
        text-align: right;
    }

    .player-name {
        color: var(--gold);
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .player-stats {
        color: var(--light);
        font-size: 0.7rem;
        display: flex;
        gap: 1rem;
        justify-content: space-between;
    }

    .player-panel.p2 .player-stats {
        flex-direction: row-reverse;
    }

    .stat-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .stat-label {
        color: var(--slate);
        min-width: 50px;
    }

    .stat-value {
        color: var(--coral);
        min-width: 40px;
        text-align: right;
    }

    .player-panel.p2 .stat-value {
        text-align: left;
    }

    .lives {
        color: var(--coral);
    }

    .score {
        color: var(--gold);
    }

    .connection-status {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        font-family: system-ui, sans-serif;
        font-size: 0.8rem;
        color: var(--slate);
        background: rgba(28, 30, 38, 0.8);
        padding: 0.5rem 1rem;
        border: 1px solid var(--slate);
        pointer-events: none;
    }

    .connection-status.connected {
        color: var(--gold);
        border-color: var(--gold);
    }

    .connection-status.disconnected {
        color: var(--coral);
        border-color: var(--coral);
    }

    /* Game Over Summary Screen */
    #multiplayer-game-over-screen {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .game-over-title {
        color: white;
        font-family: 'Press Start 2P', monospace;
        font-size: 48px;
        margin-bottom: 40px;
    }

    .stat-row {
        margin: 10px 0;
    }

    .stat-label {
        color: white;
        font-family: 'Press Start 2P', monospace;
        font-size: 20px;
    }

    .stat-value {
        color: #E1B100;
        font-family: 'Press Start 2P', monospace;
        font-size: 20px;
    }

    .button-group {
        margin-top: 50px;
        display: flex;
        gap: 20px;
    }

    .retry-btn {
        background: transparent;
        border: 3px solid #E1B100;
        color: #E1B100;
        font-family: 'Press Start 2P', monospace;
        font-size: 16px;
        padding: 15px 30px;
        cursor: pointer;
    }

    .menu-btn {
        background: transparent;
        border: 3px solid #7A8D9D;
        color: #7A8D9D;
        font-family: 'Press Start 2P', monospace;
        font-size: 16px;
        padding: 15px 30px;
        cursor: pointer;
    }

    .retry-btn:hover {
        background: #E1B100;
        color: black;
    }

    .menu-btn:hover {
        background: #7A8D9D;
        color: black;
    }
</style>
{% endblock %}

{% block content %}
<canvas id="canvas"></canvas>

<div class="hud">
    <!-- Player 1 (Left) -->
    <div class="player-panel p1">
        <div class="player-name" id="p1-name">Player 1</div>
        <div class="player-stats">
            <div class="stat-item">
                <span class="stat-label">Score:</span>
                <span class="stat-value score" id="p1-score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Lives:</span>
                <span class="stat-value lives" id="p1-lives">3</span>
            </div>
        </div>
    </div>

    <!-- Player 2 (Right) -->
    <div class="player-panel p2">
        <div class="player-name" id="p2-name">Player 2</div>
        <div class="player-stats">
            <div class="stat-item">
                <span class="stat-label">Score:</span>
                <span class="stat-value score" id="p2-score">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Lives:</span>
                <span class="stat-value lives" id="p2-lives">3</span>
            </div>
        </div>
    </div>

    <div class="connection-status" id="connection-status">Connecting...</div>
</div>

<!-- Game Over Summary Screen -->
<div id="multiplayer-game-over-screen">
    <h2 class="game-over-title">GAME OVER</h2>
    
    <div class="stat-row">
        <span class="stat-label">TEAM SCORE: </span>
        <span class="stat-value" id="team-final-score">0</span>
    </div>
    
    <div class="stat-row">
        <span class="stat-label">TEAM ASTEROIDS: </span>
        <span class="stat-value" id="team-asteroids-destroyed">0</span>
    </div>
    
    <div class="stat-row">
        <span class="stat-label">TIME SURVIVED: </span>
        <span class="stat-value" id="team-time-survived">0:00</span>
    </div>
    
    <div class="button-group">
        <button class="retry-btn" onclick="playAgain()">PLAY AGAIN</button>
        <button class="menu-btn" onclick="exitToHome()">HOME</button>
    </div>
</div>

<script src="{{ url_for('static', path='js/astro-blaster.js') }}"></script>
{% endblock %}
